<div class="login-page">
    <div class="login-card">

        <div class="login-brand">
            <div class="brand-icon" aria-hidden="true">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 11l3 3L22 4" />
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
                </svg>
            </div>
            <h1 class="brand-name">TaskFlow</h1>
        </div>

        <div class="login-header">
            <h2>Welcome back</h2>
            <p>Sign in to your account to continue</p>
        </div>

        <form (ngSubmit)="onSubmit()" novalidate>
            <div class="form-group">
                <label class="form-label" for="email">Email address</label>
                <input class="form-control" type="email" id="email" [(ngModel)]="email" name="email" required
                    autocomplete="email" placeholder="you@example.com" aria-required="true" />
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" [(ngModel)]="password" name="password"
                    required autocomplete="current-password" placeholder="Enter your password" aria-required="true" />
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger" role="alert" aria-live="polite">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg login-btn">
                Sign in
            </button>
        </form>

        <div class="demo-section">
            <div class="demo-label">Demo credentials</div>
            <div class="demo-grid">
                <div class="demo-item">
                    <span class="demo-role">Admin</span>
                    <span class="demo-creds">admin&#64;test.com / admin123</span>
                </div>
                <div class="demo-item">
                    <span class="demo-role">Manager</span>
                    <span class="demo-creds">manager&#64;test.com / manager123</span>
                </div>
                <div class="demo-item">
                    <span class="demo-role">Employee</span>
                    <span class="demo-creds">employee1&#64;test.com / employee123</span>
                </div>
            </div>
        </div>

    </div>
</div>
